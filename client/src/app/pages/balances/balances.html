<div class="balances">
    <h1>Balances</h1>
    <div class="addAccountPanel">
        <form (ngSubmit)="onAddAccount()">
            <h2>Add Account:</h2>
            Account Name: <input type="text" name="accountName" placeholder="Chequings/Savings" class="textInput" [(ngModel)]="accountName" /> <br />
            Account Balance: <input type="text" name="currentBalance" placeholder="15000" class="textInput" [(ngModel)]="balance" /> <br />
            <button type="submit">Add</button>
        </form> 
        <br />
        <form (ngSubmit)="onAddBorrowing()">
            <h2>Add Loans:</h2>
            Account Name: <input type="text" name="borrowingAccountName" placeholder="Student Loans" class="textInput" [(ngModel)]="borrowingAccountName" /> <br />
            Account Balance: <input type="text" name="borrowingAccountOutstanding" placeholder="25300" class="textInput" [(ngModel)]="borrowingAccountOutstanding" /> <br />
            <button type="submit">Add</button>
        </form>
    </div>
</div>
